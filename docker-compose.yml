services:
  app:
    build: .
    container_name: eleicao
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/php/conf.d/99-app.ini:/usr/local/etc/php/conf.d/99-app.ini
    environment:
      - TZ=America/Belem
    depends_on:
      - db

  node:
    image: node:20-alpine
    container_name: framework
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev"

  db:
    image: mariadb:10.6
    container_name: db_container_name
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password_root
      MYSQL_DATABASE: db_name
      MYSQL_USER: root
      MYSQL_PASSWORD: password_myswl
      TZ: America/Belem
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: